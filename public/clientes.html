<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Estudio Jurídico</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/clientes.css">
    <script src="./js/theme.js"></script>
</head>
<body>
    
    <nav class="navbar">
        <h2>Estudio Jurídico</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html" class="active">Clientes</a></li>
            <li><a href="agenda.html">Agenda</a></li>
            <li><a href="expedientes.html">Expedientes</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="cerrarSesion()" style="color: #ef4444;">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="section-header">
            <h1>Gestión de Clientes</h1>
            <div class="actions">
                <input type="text" id="searchInput" placeholder="Buscar por DNI o Apellido...">
                <button id="btnNuevoCliente" class="btn-primary">+ Nuevo Cliente</button>
            </div>
        </header>

        <section class="table-container">
            <table id="tablaClientes">
                <thead>
                    <tr>
                        <th>Nombre y Apellido</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyClientes">
                    <tr><td colspan="4" style="text-align: center;">Cargando directorio de clientes...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <div id="modalNuevoCliente" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Agregar Nuevo Cliente</h2>
                <button class="btn-close" id="btnCerrarModal">&times;</button>
            </header>
            
            <form id="formNuevoCliente" class="modal-form">
                <div class="form-group">
                    <label for="nombre">Nombre y Apellido *</label>
                    <input type="text" id="nombre" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="dni">DNI *</label>
                        <input type="text" id="dni" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono *</label>
                        <input type="tel" id="telefono" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label for="notas">Notas del Caso</label>
                    <textarea id="notas" rows="3" placeholder="Breve descripción..."></textarea>
                </div>

                <footer class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancelarModal">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Cliente</button>
                </footer>
            </form>
        </div>
    </div>

    <script src="./js/clientes.js"></script>
</body>
</html>
