<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Estudio Jurídico</title>
    <link rel="stylesheet" href="./css/clientes.css">
</head>
<body>
    
    <nav class="navbar">
        <h2>Estudio Jurídico</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html" class="active">Clientes</a></li>
            <li><a href="agenda.html">Agenda</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="section-header">
            <h1>Gestión de Clientes</h1>
            <div class="actions">
                <input type="text" id="searchInput" placeholder="Buscar por DNI o Apellido...">
                <button id="btnNuevoCliente" class="btn-primary">+ Nuevo Cliente</button>
            </div>
        </header>

        <section class="table-container">
            <table id="tablaClientes">
                <thead>
                    <tr>
                        <th>Nombre y Apellido</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Estado de Cuenta</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyClientes">
                    <tr>
                        <td>Carlos Gardel</td>
                        <td>12.345.678</td>
                        <td>11-5555-4444</td>
                        <td><span class="badge badge-deuda">Con Deuda</span></td>
                        <td>
                            <button class="btn-secondary">Ver Cuenta</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <div id="modalNuevoCliente" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Agregar Nuevo Cliente</h2>
                <button class="btn-close" id="btnCerrarModal">&times;</button>
            </header>
            
            <form id="formNuevoCliente" class="modal-form">
                <div class="form-group">
                    <label for="nombre">Nombre y Apellido *</label>
                    <input type="text" id="nombre" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="dni">DNI *</label>
                        <input type="number" id="dni" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono *</label>
                        <input type="tel" id="telefono" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label for="notas">Notas del Caso</label>
                    <textarea id="notas" rows="3" placeholder="Breve descripción del expediente..."></textarea>
                </div>

                <footer class="modal-actions">
                    <button type="button" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Cliente</button>
                </footer>
            </form>
        </div>
    </div>
    </body>
</html>
