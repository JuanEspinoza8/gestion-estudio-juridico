<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Estudio Jurídico</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/clientes.css">
    <link rel="stylesheet" href="./css/agenda.css">
    <script src="./js/theme.js"></script>

</head>

<body>

    <nav class="navbar">
        <h2>Estudio Jurídico</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="agenda.html" class="active">Agenda</a></li>
            <li><a href="expedientes.html">Expedientes</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="cerrarSesion()" style="color: #ef4444;">Cerrar Sesión</a>
            </li>
        </ul>
    </nav>

    <main class="container">
        <header class="section-header">
            <h1>Agenda de Turnos</h1>
            <div class="actions">
                <button id="btnNuevoTurno" class="btn-primary">+ Nuevo Turno</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn activo" onclick="cambiarTabAgenda('calendario', this)">Calendario</button>
            <button class="tab-btn" onclick="cambiarTabAgenda('completados', this)">Historial (Lista)</button>
        </div>

        <!-- AQUÍ NACE EL CALENDARIO -->
        <section class="agenda-container tab-panel activo" id="tab-calendario">
            <div id="calendar"></div>
        </section>

        <!-- SECCIÓN DE HISTORIAL (Mantenemos la vista de lista para el archivo muerto) -->
        <section class="agenda-container tab-panel" id="tab-completados">
            <ul class="lista-turnos" id="contenedorCompletados">
                <p style="text-align: center; color: #64748b; padding: 20px;">Cargando historial...</p>
            </ul>
        </section>
    </main>

    <!-- Modal: NUEVO TURNO -->
    <div id="modalNuevoTurno" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Agendar Turno</h2>
                <button class="btn-close" id="btnCerrarModalTurno">&times;</button>
            </header>
            <form id="formNuevoTurno" class="modal-form">
                <div class="form-group">
                    <label for="clienteId">Cliente (Opcional)</label>
                    <select id="clienteId">
                        <option value="">Cargando clientes...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha">Fecha *</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="hora">Hora *</label>
                        <input type="time" id="hora" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tipoEvento">Tipo de Evento *</label>
                    <select id="tipoEvento" required
                        onchange="document.getElementById('tipoEventoOtro').style.display = this.value === 'Otro' ? 'block' : 'none';">
                        <option value="">Seleccionar...</option>
                        <option value="Audiencia">Audiencia</option>
                        <option value="Mediación">Mediación</option>
                        <option value="Presentar Escrito">Presentar Escrito</option>
                        <option value="Reunión Cliente">Reunión Cliente</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <input type="text" id="tipoEventoOtro" style="display:none; margin-top:10px;"
                        placeholder="Especifique el evento...">
                </div>
                <footer class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancelarModalTurno">Cancelar</button>
                    <button type="submit" class="btn-primary">Agendar</button>
                </footer>
            </form>
        </div>
    </div>

    <!-- Modal: EDITAR TURNO -->
    <div id="modalEditarTurno" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Editar Turno</h2>
                <button class="btn-close" id="btnCerrarModalEditar">&times;</button>
            </header>
            <form id="formEditarTurno" class="modal-form">
                <input type="hidden" id="editarTurnoId">
                <div class="form-group">
                    <label for="editarClienteId">Cliente (Opcional)</label>
                    <select id="editarClienteId">
                        <option value="">Cargando clientes...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editarFecha">Fecha *</label>
                        <input type="date" id="editarFecha" required>
                    </div>
                    <div class="form-group">
                        <label for="editarHora">Hora *</label>
                        <input type="time" id="editarHora" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editarTipoEvento">Tipo de Evento *</label>
                    <select id="editarTipoEvento" required
                        onchange="document.getElementById('editarTipoEventoOtro').style.display = this.value === 'Otro' ? 'block' : 'none';">
                        <option value="">Seleccionar...</option>
                        <option value="Audiencia">Audiencia</option>
                        <option value="Mediación">Mediación</option>
                        <option value="Presentar Escrito">Presentar Escrito</option>
                        <option value="Reunión Cliente">Reunión Cliente</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <input type="text" id="editarTipoEventoOtro" style="display:none; margin-top:10px;"
                        placeholder="Especifique el evento...">
                </div>
                <div class="form-group">
                    <label for="editarEstado">Estado</label>
                    <select id="editarEstado">
                        <option value="pendiente">Pendiente</option>
                        <option value="completado">Completado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <footer class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancelarModalEditar">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Cambios</button>
                </footer>
            </form>
        </div>
    </div>

    <!-- CDN DE FULLCALENDAR v6 -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <!-- NUESTRO SCRIPT -->
    <script src="./js/agenda.js"></script>
</body>

</html>
