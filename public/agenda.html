<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Estudio Jurídico</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/clientes.css">
    <link rel="stylesheet" href="./css/agenda.css">
</head>
<body>
    
    <nav class="navbar">
        <h2>Estudio Jurídico</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="agenda.html" class="active">Agenda</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="cerrarSesion()" style="color: #ef4444;">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="section-header">
            <h1>Agenda de Turnos</h1>
            <div class="actions">
                <button id="btnNuevoTurno" class="btn-primary">+ Nuevo Turno</button>
            </div>
        </header>

        <section class="agenda-container">
            <ul class="lista-turnos" id="contenedorTurnos">
                <p style="text-align: center; color: #64748b; padding: 20px;">Cargando calendario...</p>
            </ul>
        </section>
    </main>

    <div id="modalNuevoTurno" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Agendar Turno</h2>
                <button class="btn-close" id="btnCerrarModalTurno">&times;</button>
            </header>
            
            <form id="formNuevoTurno" class="modal-form">
                <div class="form-group">
                    <label for="clienteId">Cliente *</label>
                    <select id="clienteId" required>
                        <option value="">Cargando clientes...</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha">Fecha *</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="hora">Hora *</label>
                        <input type="time" id="hora" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="motivo">Motivo de la consulta *</label>
                    <input type="text" id="motivo" required placeholder="Ej: Sucesión, Divorcio, Contrato...">
                </div>

                <footer class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancelarModalTurno">Cancelar</button>
                    <button type="submit" class="btn-primary">Agendar</button>
                </footer>
            </form>
        </div>
    </div>

    <script src="./js/agenda.js"></script>
</body>
</html>
