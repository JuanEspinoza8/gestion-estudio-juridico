<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Estudio Jurídico</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/clientes.css">
    <link rel="stylesheet" href="./css/agenda.css">
    <script src="./js/theme.js"></script>
    <style>
        /* Estilos para la tarjeta de turno actualizada */
        .turno-card {
            background: white;
            border-radius: 8px;
            padding: 18px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.07);
            border-left: 5px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
            transition: box-shadow 0.2s;
        }
        .turno-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
        .border-urgente { border-left-color: #ef4444; }
        .border-normal { border-left-color: #3b82f6; }

        .turno-fecha {
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .turno-fecha strong { color: #1e293b; font-size: 0.95rem; text-transform: capitalize; }
        .turno-fecha span { color: #3b82f6; font-size: 1.1rem; font-weight: bold; }

        .badge-hoy {
            display: inline-block;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 10px;
            margin-top: 2px;
            width: fit-content;
        }

        .turno-detalle { flex: 1; }
        .turno-detalle h3 { color: #0f172a; margin-bottom: 4px; font-size: 1rem; }
        .turno-detalle p { color: #64748b; font-size: 0.9rem; }

        .turno-acciones { display: flex; flex-direction: column; gap: 6px; }

        .btn-editar, .btn-eliminar {
            border: none;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: bold;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .btn-editar { background: #e0f2fe; color: #0369a1; }
        .btn-eliminar { background: #fee2e2; color: #b91c1c; }
        .btn-editar:hover, .btn-eliminar:hover { opacity: 0.8; }

        /* Lista sin estilos de lista */
        #contenedorTurnos, #contenedorCompletados { list-style: none; padding: 0; }

        /* Estilos de Tabs */
        .tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:2px solid #e2e8f0; }
        .tab-btn { padding:10px 20px; border:none; background:none; cursor:pointer; font-size:0.95rem; color:#64748b; border-bottom:3px solid transparent; margin-bottom:-2px; font-weight:600; transition:color 0.2s; }
        .tab-btn.activo { color:#3b82f6; border-bottom-color:#3b82f6; }
        .tab-btn:hover { color:#1e293b; }
        .tab-panel { display:none; }
        .tab-panel.activo { display:block; }

        @media (max-width: 600px) {
            .turno-card { flex-direction: column; align-items: flex-start; }
            .turno-acciones { flex-direction: row; }
        }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <h2>Estudio Jurídico</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="agenda.html" class="active">Agenda</a></li>
            <li><a href="expedientes.html">Expedientes</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="cerrarSesion()" style="color: #ef4444;">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="section-header">
            <h1>Agenda de Turnos</h1>
            <div class="actions">
                <button id="btnNuevoTurno" class="btn-primary">+ Nuevo Turno</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn activo" onclick="cambiarTabAgenda('pendientes', this)">Pendientes</button>
            <button class="tab-btn" onclick="cambiarTabAgenda('completados', this)">Historial (Completados)</button>
        </div>

        <section class="agenda-container tab-panel activo" id="tab-pendientes">
            <ul class="lista-turnos" id="contenedorTurnos">
                <p style="text-align: center; color: #64748b; padding: 20px;">Cargando calendario...</p>
            </ul>
        </section>

        <section class="agenda-container tab-panel" id="tab-completados">
            <ul class="lista-turnos" id="contenedorCompletados">
            </ul>
        </section>
    </main>

    <!-- Modal: NUEVO TURNO -->
    <div id="modalNuevoTurno" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Agendar Turno</h2>
                <button class="btn-close" id="btnCerrarModalTurno">&times;</button>
            </header>
            <form id="formNuevoTurno" class="modal-form">
                <div class="form-group">
                    <label for="clienteId">Cliente (Opcional)</label>
                    <select id="clienteId">
                        <option value="">Cargando clientes...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha">Fecha *</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="hora">Hora *</label>
                        <input type="time" id="hora" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tipoEvento">Tipo de Evento *</label>
                    <select id="tipoEvento" required onchange="document.getElementById('tipoEventoOtro').style.display = this.value === 'Otro' ? 'block' : 'none';">
                        <option value="">Seleccionar...</option>
                        <option value="Audiencia">Audiencia</option>
                        <option value="Mediación">Mediación</option>
                        <option value="Presentar Escrito">Presentar Escrito</option>
                        <option value="Reunión Cliente">Reunión Cliente</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <input type="text" id="tipoEventoOtro" style="display:none; margin-top:10px;" placeholder="Especifique el evento...">
                </div>
                <footer class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancelarModalTurno">Cancelar</button>
                    <button type="submit" class="btn-primary">Agendar</button>
                </footer>
            </form>
        </div>
    </div>

    <!-- Modal: EDITAR TURNO -->
    <div id="modalEditarTurno" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Editar Turno</h2>
                <button class="btn-close" id="btnCerrarModalEditar">&times;</button>
            </header>
            <form id="formEditarTurno" class="modal-form">
                <input type="hidden" id="editarTurnoId">
                <div class="form-group">
                    <label for="editarClienteId">Cliente (Opcional)</label>
                    <select id="editarClienteId">
                        <option value="">Cargando clientes...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editarFecha">Fecha *</label>
                        <input type="date" id="editarFecha" required>
                    </div>
                    <div class="form-group">
                        <label for="editarHora">Hora *</label>
                        <input type="time" id="editarHora" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editarTipoEvento">Tipo de Evento *</label>
                    <select id="editarTipoEvento" required onchange="document.getElementById('editarTipoEventoOtro').style.display = this.value === 'Otro' ? 'block' : 'none';">
                        <option value="">Seleccionar...</option>
                        <option value="Audiencia">Audiencia</option>
                        <option value="Mediación">Mediación</option>
                        <option value="Presentar Escrito">Presentar Escrito</option>
                        <option value="Reunión Cliente">Reunión Cliente</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <input type="text" id="editarTipoEventoOtro" style="display:none; margin-top:10px;" placeholder="Especifique el evento...">
                </div>
                <div class="form-group">
                    <label for="editarEstado">Estado</label>
                    <select id="editarEstado">
                        <option value="pendiente">Pendiente</option>
                        <option value="completado">Completado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <footer class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancelarModalEditar">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Cambios</button>
                </footer>
            </form>
        </div>
    </div>

    <script src="./js/agenda.js"></script>
</body>
</html>
