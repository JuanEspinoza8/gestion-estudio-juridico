<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso - Estudio Jurídico</title>
    <!-- Usamos Google Fonts para darle un toque más corporativo -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./css/login.css">
</head>

<body class="dark-theme">

    <div class="login-wrapper">
        <div class="login-card">

            <div class="login-header">
                <div class="logo-placeholder">
                    <span class="material-symbols-outlined logo-icon">balance</span>
                </div>
                <h1>Estudio Jurídico</h1>
                <p>Portal de Gestión Integral</p>
            </div>

            <form id="formLogin" class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="gestion-estudio@gmail.com">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-login">Ingresar al Sistema</button>
            </form>

            <div class="login-footer">
                <p>¿Olvidó su contraseña o necesita acceso?</p>
                <p class="highlight">Comuníquese con su proveedor de sistema.</p>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/login.js"></script>
</body>

</html>
