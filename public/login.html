<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estudio Jurídico</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/login.css">
</head>
<body class="bg-login">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="material-symbols-outlined logo-icon">gavel</span>
                <h1>Estudio Jurídico</h1>
                <p>Ingrese sus credenciales para acceder</p>
            </div>
            
            <form id="loginForm" action="dashboard.html">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="abogado@estudio.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary btn-block">Ingresar al Sistema</button>
            </form>
        </div>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
